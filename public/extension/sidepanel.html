<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { background-color: #0f111a; color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 95vh; box-sizing: border-box; }
    .header { font-size: 20px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    .search-bar { background: #1a1d2d; border: 1px solid #2d3142; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 15px; outline: none; }
    .tabs { display: flex; gap: 15px; border-bottom: 1px solid #2d3142; padding-bottom: 10px; margin-bottom: 15px; }
    .tab { cursor: pointer; color: #888; font-size: 14px; padding-bottom: 5px; font-weight: bold; }
    .tab.active { color: #4a72ff; border-bottom: 2px solid #4a72ff; }
    .clips-container { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
    .clip-item { background: #1a1d2d; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .clip-text { max-width: 75%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: #ccc; }
    .copy-btn { background: #2d3142; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .copy-btn:hover { background: #4a72ff; }
    .input-area { margin-top: auto; background: #1a1d2d; padding: 10px; border-radius: 10px; border: 1px solid #2d3142; }
    .input-box { background: transparent; border: none; color: white; padding: 5px; width: 100%; box-sizing: border-box; margin-bottom: 10px; resize: none; height: 50px; outline: none; }
    .save-btn { background: #3a5bcc; color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: bold; }
    .save-btn:hover { background: #4a72ff; }
    #toast { display: none; background: #4caf50; color: white; padding: 10px; text-align: center; border-radius: 4px; margin-bottom: 10px; font-size: 12px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="header">ClipIQ</div>
  
  <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search clips...">
  
  <div class="tabs">
    <div class="tab active" data-category="all">All</div>
    <div class="tab" data-category="emails">📧 Emails</div>
    <div class="tab" data-category="phones">📞 Phones</div>
    <div class="tab" data-category="text">📄 Text</div>
  </div>

  <div id="toast">Copied to clipboard!</div>

  <div class="clips-container" id="clipsContainer">
    </div>

  <div class="input-area">
    <textarea id="clipInput" class="input-box" placeholder="Paste or type here to save a clip..."></textarea>
    <button id="saveBtn" class="save-btn">+ Save to ClipIQ</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
