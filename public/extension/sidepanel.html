<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ClipIQ</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0b0f1c;color:#e6edf3;height:100vh;display:flex;flex-direction:column;font-size:13px}
    header{padding:12px 14px;border-bottom:1px solid #1e2740;display:flex;align-items:center;gap:8px;background:#0f1424;flex-shrink:0}
    header img{width:22px;height:22px;border-radius:6px}
    header h1{font-size:14px;font-weight:700;flex:1;color:#fff}
    header a{font-size:11px;color:#58a6ff;text-decoration:none;white-space:nowrap}
    .search{padding:8px 12px;border-bottom:1px solid #1e2740;flex-shrink:0}
    .search input{width:100%;padding:7px 10px;background:#151c2e;border:1px solid #2a3555;border-radius:8px;color:#e6edf3;font-size:12px;outline:none}
    .search input:focus{border-color:#3b82f6}
    .tabs{display:flex;border-bottom:1px solid #1e2740;background:#0f1424;flex-shrink:0}
    .tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:#6b7fa3;cursor:pointer;border-bottom:2px solid transparent}
    .tab.active{color:#3b82f6;border-bottom-color:#3b82f6}
    .clips{flex:1;overflow-y:auto;padding:8px}
    .clip{background:#111827;border:1px solid #1e2740;border-radius:10px;padding:10px 11px;margin-bottom:7px;transition:all 0.15s}
    .clip:hover{border-color:#3b82f6;background:#131f35}
    .clip-type{font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:4px}
    .clip-type.email{color:#34d399}.clip-type.phone{color:#f59e0b}.clip-type.text{color:#a78bfa}
    .clip-value{font-size:12px;color:#e6edf3;word-break:break-all;line-height:1.4}
    .clip-name{font-size:10px;color:#6b7fa3;margin-top:3px}
    .clip-actions{display:flex;gap:5px;margin-top:7px}
    .btn{padding:4px 10px;border-radius:6px;border:none;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.15s}
    .btn-copy{background:#1e3a5f;color:#60a5fa}.btn-copy:hover{background:#1d4ed8;color:#fff}
    .btn-paste{background:#14532d;color:#4ade80}.btn-paste:hover{background:#16a34a;color:#fff}
    .btn-delete{background:#2d1515;color:#f87171}.btn-delete:hover{background:#7f1d1d;color:#fff}
    .empty{text-align:center;padding:40px 20px;color:#4b5980}
    .empty p{font-size:12px;line-height:1.8}
    .add-section{padding:10px 12px;border-top:1px solid #1e2740;background:#0f1424;flex-shrink:0}
    .add-section textarea{width:100%;padding:8px 10px;background:#151c2e;border:1px solid #2a3555;border-radius:8px;color:#e6edf3;font-size:12px;outline:none;resize:none;height:60px;font-family:inherit}
    .add-section textarea:focus{border-color:#3b82f6}
    .add-section textarea::placeholder{color:#4b5980}
    .add-row{display:flex;gap:6px;margin-top:6px}
    .btn-save{flex:1;padding:8px;background:#1d4ed8;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
    .btn-save:hover{background:#2563eb}
    .btn-clip{padding:8px 10px;background:#151c2e;color:#6b7fa3;border:1px solid #2a3555;border-radius:8px;font-size:12px;cursor:pointer}
    .btn-clip:hover{border-color:#3b82f6;color:#60a5fa}
    .sync-bar{padding:4px 12px;background:#0a1628;border-top:1px solid #1e2740;font-size:10px;color:#4b5980;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    .sync-dot{width:6px;height:6px;border-radius:50%;background:#4b5980;display:inline-block;margin-right:4px}
    .sync-dot.synced{background:#34d399}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1d4ed8;color:#fff;padding:7px 16px;border-radius:20px;font-size:11px;font-weight:600;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:999;white-space:nowrap}
    .toast.show{opacity:1}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e2740;border-radius:4px}
  </style>
</head>
<body>

<header>
  <img src="icon.png" alt="ClipIQ"/>
  <h1>ClipIQ</h1>
  <a href="https://smartclip-iq.vercel.app" target="_blank">Open site ↗</a>
</header>

<div class="search">
  <input type="text" id="search" placeholder="🔍 Search clips..." oninput="renderClips()"/>
</div>

<div class="tabs">
  <div class="tab active" onclick="setTab('all')">All</div>
  <div class="tab" onclick="setTab('email')">📧 Emails</div>
  <div class="tab" onclick="setTab('phone')">📞 Phones</div>
  <div class="tab" onclick="setTab('text')">📝 Text</div>
</div>

<div class="clips" id="clips"></div>

<div class="add-section">
  <textarea id="pasteText" placeholder="Type or paste anything here to save..."></textarea>
  <div class="add-row">
    <button class="btn-save" onclick="saveFromInput()">＋ Save to ClipIQ</button>
    <button class="btn-clip" onclick="readFromClipboard()" title="Read from clipboard">📋</button>
  </div>
</div>

<div class="sync-bar">
  <span><span class="sync-dot" id="syncDot"></span><span id="syncStatus">Loading...</span></span>
  <span id="clipCount">0 clips</span>
</div>

<div class="toast" id="toast"></div>

<script>
const WEBSITE_URL = 'https://smartclip-iq.vercel.app';
let allClips = [];
let activeTab = 'all';
let synced = false;

// ---- Utility ----
function makeId() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}
function detectType(text) {
  const t = text.trim();
  if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(t)) return 'email';
  if (/^[\+\d\s\(\)\-\.]{7,}$/.test(t)) return 'phone';
  return 'text';
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || '#1d4ed8';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function setSyncStatus(ok, msg) {
  document.getElementById('syncDot').className = 'sync-dot' + (ok ? ' synced' : '');
  document.getElementById('syncStatus').textContent = msg;
}

// ---- Storage via background bridge ----
async function loadClips() {
  try {
    const resp = await chrome.runtime.sendMessage({ type: 'CLIPIQ_GET_CLIPS' });
    allClips = resp.clips || [];
    // Also try to pull fresh clips from the website
    await syncFromWebsite();
    setSyncStatus(true, 'Synced with website');
  } catch(e) {
    setSyncStatus(false, 'Extension storage only');
  }
  renderClips();
}

async function persistClips() {
  try {
    await chrome.runtime.sendMessage({ type: 'CLIPIQ_SAVE_CLIPS', clips: allClips });
    // Push to website too
    await syncToWebsite();
    setSyncStatus(true, 'Synced with website');
  } catch {
    setSyncStatus(false, 'Saved locally only');
  }
}

// ---- Website sync via content script injection ----
async function syncFromWebsite() {
  try {
    const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
    // Look for ClipIQ tab specifically
    const allTabs = await chrome.tabs.query({});
    const clipiqTab = allTabs.find(t => t.url && t.url.includes('smartclip-iq.vercel.app'));
    const targetTab = clipiqTab || (tab?.url?.includes('smartclip-iq') ? tab : null);

    if (targetTab) {
      const [{ result }] = await chrome.scripting.executeScript({
        target: { tabId: targetTab.id },
        func: (key) => {
          try { return localStorage.getItem(key); } catch { return null; }
        },
        args: ['clipiq.items.v2']
      });
      if (result) {
        const webClips = JSON.parse(result);
        // Merge: combine extension clips + web clips, deduplicate by id
        const map = new Map();
        [...allClips, ...webClips].forEach(c => map.set(c.id, c));
        allClips = Array.from(map.values()).sort((a,b) => a.createdAt - b.createdAt);
        await chrome.runtime.sendMessage({ type: 'CLIPIQ_SAVE_CLIPS', clips: allClips });
      }
    }
  } catch { /* website not open, that's fine */ }
}

async function syncToWebsite() {
  try {
    const allTabs = await chrome.tabs.query({});
    const clipiqTab = allTabs.find(t => t.url && t.url.includes('smartclip-iq.vercel.app'));
    if (!clipiqTab) return;
    await chrome.scripting.executeScript({
      target: { tabId: clipiqTab.id },
      func: (key, data) => {
        try { localStorage.setItem(key, data); window.dispatchEvent(new Event('storage')); } catch {}
      },
      args: ['clipiq.items.v2', JSON.stringify(allClips)]
    });
  } catch { /* website not open */ }
}

// ---- UI ----
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['all','email','phone','text'][i] === tab);
  });
  renderClips();
}

function renderClips() {
  const q = document.getElementById('search').value.toLowerCase();
  let clips = [...allClips].reverse();
  if (activeTab !== 'all') clips = clips.filter(c => c.type === activeTab);
  if (q) clips = clips.filter(c =>
    c.value.toLowerCase().includes(q) || (c.name||'').toLowerCase().includes(q)
  );

  document.getElementById('clipCount').textContent = allClips.length + ' clip' + (allClips.length !== 1 ? 's' : '');

  const el = document.getElementById('clips');
  if (clips.length === 0) {
    el.innerHTML = `<div class="empty"><p>${allClips.length === 0
      ? 'No clips yet.<br/>Paste something below<br/>to save your first clip! 👇'
      : 'No clips match your search.'}</p></div>`;
    return;
  }

  el.innerHTML = clips.map(clip => `
    <div class="clip">
      <div class="clip-type ${clip.type}">${clip.type}</div>
      <div class="clip-value">${escHtml(clip.value)}</div>
      ${clip.name ? `<div class="clip-name">👤 ${escHtml(clip.name)}</div>` : ''}
      <div class="clip-actions">
        <button class="btn btn-copy" onclick="copyClip('${escHtml(clip.id)}','${escHtml(clip.value).replace(/'/g,"\\'")}')">Copy</button>
        <button class="btn btn-paste" onclick="pasteClip('${escHtml(clip.value).replace(/'/g,"\\'")}')">Paste</button>
        <button class="btn btn-delete" onclick="deleteClip('${escHtml(clip.id)}')">✕</button>
      </div>
    </div>
  `).join('');
}

async function copyClip(id, value) {
  try {
    await navigator.clipboard.writeText(value);
    showToast('✓ Copied!', '#1d4ed8');
  } catch {
    showToast('Copy failed', '#7f1d1d');
  }
}

async function pasteClip(value) {
  try {
    const resp = await chrome.runtime.sendMessage({ type: 'CLIPIQ_PASTE', text: value });
    if (resp?.ok) {
      showToast('✓ Pasted into page!', '#14532d');
    } else {
      await navigator.clipboard.writeText(value);
      showToast('Copied! Now press Ctrl+V', '#1d4ed8');
    }
  } catch {
    await navigator.clipboard.writeText(value).catch(()=>{});
    showToast('Copied! Now press Ctrl+V', '#1d4ed8');
  }
}

async function deleteClip(id) {
  allClips = allClips.filter(c => c.id !== id);
  await persistClips();
  renderClips();
  showToast('Deleted', '#7f1d1d');
}

async function saveFromInput() {
  const ta = document.getElementById('pasteText');
  const raw = ta.value.trim();
  if (!raw) { showToast('Nothing to save!', '#7f1d1d'); return; }

  const lines = raw.split(/[\n,]+/).map(l => l.trim()).filter(Boolean);
  const now = Date.now();

  lines.forEach((line, i) => {
    allClips.push({
      id: makeId() + i,
      value: line,
      type: detectType(line),
      createdAt: now + i,
      pinned: false,
    });
  });

  await persistClips();
  ta.value = '';
  renderClips();
  showToast(`✓ Saved ${lines.length} clip${lines.length > 1 ? 's' : ''}!`, '#14532d');
}

async function readFromClipboard() {
  try {
    const resp = await chrome.runtime.sendMessage({ type: 'CLIPIQ_READ' });
    if (resp?.text?.trim()) {
      document.getElementById('pasteText').value = resp.text.trim();
      showToast('📋 Clipboard loaded!', '#1d4ed8');
    } else {
      showToast('Clipboard is empty', '#7f1d1d');
    }
  } catch {
    showToast('Could not read clipboard', '#7f1d1d');
  }
}

// ---- Init ----
loadClips();

// Refresh every 5 seconds to pick up changes from website
setInterval(async () => {
  await syncFromWebsite();
  renderClips();
}, 5000);
</script>
</body>
</html>
