<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>ClipIQ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0b0f1c;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      height: 100vh;
      font-size: 13px;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #0f1424;
      border-bottom: 1px solid #1e2740;
      flex-shrink: 0;
    }
    .header img { width: 24px; height: 24px; border-radius: 6px; }
    .header-title { font-size: 15px; font-weight: 700; flex: 1; }
    .header-link {
      font-size: 11px; color: #58a6ff; text-decoration: none;
      padding: 4px 8px; border: 1px solid #1e3a5f; border-radius: 6px;
    }
    .header-link:hover { background: #1e3a5f; }

    /* SEARCH */
    .search-box {
      padding: 8px 12px;
      border-bottom: 1px solid #1e2740;
      flex-shrink: 0;
    }
    .search-box input {
      width: 100%;
      padding: 7px 12px;
      background: #151c2e;
      border: 1px solid #2a3555;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 12px;
      outline: none;
    }
    .search-box input:focus { border-color: #3b82f6; }

    /* TABS */
    .tabs {
      display: flex;
      background: #0f1424;
      border-bottom: 1px solid #1e2740;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 8px 2px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: #6b7fa3;
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: #93c5fd; }
    .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }

    /* CLIPS LIST */
    .clips-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .clips-list::-webkit-scrollbar { width: 4px; }
    .clips-list::-webkit-scrollbar-thumb { background: #1e2740; border-radius: 4px; }

    .clip-card {
      background: #111827;
      border: 1px solid #1e2740;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 6px;
      transition: border-color 0.15s;
    }
    .clip-card:hover { border-color: #2a4a7f; }

    .clip-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      margin-bottom: 5px;
    }
    .badge-email { background: #064e3b; color: #34d399; }
    .badge-phone { background: #451a03; color: #f59e0b; }
    .badge-text  { background: #2e1065; color: #a78bfa; }

    .clip-value {
      font-size: 12px;
      color: #e6edf3;
      word-break: break-all;
      line-height: 1.5;
    }
    .clip-name {
      font-size: 10px;
      color: #6b7fa3;
      margin-top: 3px;
    }
    .clip-actions {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }
    .action-btn {
      padding: 4px 10px;
      border-radius: 6px;
      border: none;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-copy   { background: #1e3a5f; color: #60a5fa; }
    .btn-copy:hover   { background: #1d4ed8; color: #fff; }
    .btn-paste  { background: #14532d; color: #4ade80; }
    .btn-paste:hover  { background: #15803d; color: #fff; }
    .btn-delete { background: #2d1515; color: #f87171; }
    .btn-delete:hover { background: #7f1d1d; color: #fff; }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #4b5980;
    }
    .empty-state .emoji { font-size: 36px; margin-bottom: 12px; }
    .empty-state p { font-size: 12px; line-height: 1.8; }

    /* ADD SECTION */
    .add-section {
      padding: 10px 12px;
      border-top: 1px solid #1e2740;
      background: #0f1424;
      flex-shrink: 0;
    }
    .add-textarea {
      width: 100%;
      padding: 8px 10px;
      background: #151c2e;
      border: 1px solid #2a3555;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      resize: none;
      height: 58px;
      line-height: 1.5;
    }
    .add-textarea:focus { border-color: #3b82f6; }
    .add-textarea::placeholder { color: #4b5980; }
    .add-buttons {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .btn-save {
      flex: 1;
      padding: 8px;
      background: #1d4ed8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #2563eb; }
    .btn-read-clip {
      padding: 8px 12px;
      background: #151c2e;
      color: #9ca3af;
      border: 1px solid #2a3555;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-read-clip:hover { border-color: #3b82f6; color: #60a5fa; }

    /* COUNT BAR */
    .count-bar {
      padding: 4px 12px;
      background: #090d19;
      border-top: 1px solid #1e2740;
      font-size: 10px;
      color: #4b5980;
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 76px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="header">
  <img src="icon.png" alt=""/>
  <span class="header-title">ClipIQ</span>
  <a class="header-link" href="https://smartclip-iq.vercel.app" target="_blank">Open site ↗</a>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 Search clips..."/>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="all">All</button>
  <button class="tab-btn" data-tab="email">📧 Emails</button>
  <button class="tab-btn" data-tab="phone">📞 Phones</button>
  <button class="tab-btn" data-tab="text">📝 Text</button>
</div>

<div class="clips-list" id="clipsList"></div>

<div class="add-section">
  <textarea class="add-textarea" id="addTextarea" placeholder="Paste or type here to save a clip..."></textarea>
  <div class="add-buttons">
    <button class="btn-save" id="saveBtn">＋ Save to ClipIQ</button>
    <button class="btn-read-clip" id="readClipBtn">📋 Read</button>
  </div>
</div>

<div class="count-bar">
  <span id="countLabel">0 clips</span>
  <span id="lastSaved"></span>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────
  const STORAGE_KEY = 'clips';
  let clips = [];
  let activeTab = 'all';
  let searchQuery = '';

  // ─── Storage (chrome.storage.local — works reliably in sidepanel) ─────────
  function loadClips() {
    chrome.storage.local.get(STORAGE_KEY, function(result) {
      clips = result[STORAGE_KEY] || [];
      render();
    });
  }

  function saveClips(cb) {
    chrome.storage.local.set({ [STORAGE_KEY]: clips }, function() {
      document.getElementById('lastSaved').textContent =
        'Saved ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (cb) cb();
    });
  }

  // ─── Helpers ──────────────────────────────────────────────────────────────
  function makeId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function detectType(text) {
    const t = text.trim();
    if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(t)) return 'email';
    if (/^[\+\d\s\(\)\-\.]{7,20}$/.test(t)) return 'phone';
    return 'text';
  }

  function guessName(email) {
    const local = email.split('@')[0];
    const SKIP = new Set(['info','contact','admin','support','hello','noreply','no-reply','mail','team','sales','help']);
    const parts = local
      .replace(/([a-z])([A-Z])/g, '$1 $2')
      .split(/[._\-+0-9]+/)
      .map(p => p.replace(/[^a-zA-Z]/g, '').toLowerCase())
      .filter(p => p.length >= 3 && !SKIP.has(p));
    if (parts.length < 2) return undefined;
    return parts.slice(0, 2).map(p => p[0].toUpperCase() + p.slice(1)).join(' ');
  }

  function safe(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function toast(msg, color) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.style.background = color || '#1d4ed8';
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ─── Render ───────────────────────────────────────────────────────────────
  function render() {
    const q = searchQuery.toLowerCase();

    let visible = [...clips].reverse();
    if (activeTab !== 'all') visible = visible.filter(c => c.type === activeTab);
    if (q) visible = visible.filter(c =>
      c.value.toLowerCase().includes(q) || (c.name || '').toLowerCase().includes(q)
    );

    const count = clips.length;
    document.getElementById('countLabel').textContent =
      count + ' clip' + (count !== 1 ? 's' : '');

    const list = document.getElementById('clipsList');

    if (visible.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="emoji">${count === 0 ? '📋' : '🔍'}</div>
          <p>${count === 0
            ? 'No clips yet.<br>Type or paste below<br>and hit <b>Save to ClipIQ</b>!'
            : 'No clips match your search.'
          }</p>
        </div>`;
      return;
    }

    list.innerHTML = visible.map(c => {
      const badgeClass = c.type === 'email' ? 'badge-email'
                       : c.type === 'phone' ? 'badge-phone'
                       : 'badge-text';
      return `
        <div class="clip-card">
          <span class="clip-badge ${badgeClass}">${safe(c.type)}</span>
          <div class="clip-value">${safe(c.value)}</div>
          ${c.name ? `<div class="clip-name">👤 ${safe(c.name)}</div>` : ''}
          <div class="clip-actions">
            <button class="action-btn btn-copy"   onclick="doCopy('${safe(c.id)}')">Copy</button>
            <button class="action-btn btn-paste"  onclick="doPaste('${safe(c.id)}')">Paste</button>
            <button class="action-btn btn-delete" onclick="doDelete('${safe(c.id)}')">✕ Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  // ─── Actions ──────────────────────────────────────────────────────────────
  function getClipById(id) {
    return clips.find(c => c.id === id);
  }

  function doCopy(id) {
    const clip = getClipById(id);
    if (!clip) return;
    navigator.clipboard.writeText(clip.value)
      .then(() => toast('✓ Copied!', '#1d4ed8'))
      .catch(() => toast('Copy failed', '#7f1d1d'));
  }

  function doPaste(id) {
    const clip = getClipById(id);
    if (!clip) return;
    // First copy it, then send paste message to background
    navigator.clipboard.writeText(clip.value).then(() => {
      chrome.runtime.sendMessage({ type: 'PASTE', text: clip.value }, function(resp) {
        if (resp && resp.ok) {
          toast('✓ Pasted!', '#14532d');
        } else {
          toast('Copied! Press Ctrl+V to paste', '#1d4ed8');
        }
      });
    }).catch(() => toast('Copy failed', '#7f1d1d'));
  }

  function doDelete(id) {
    clips = clips.filter(c => c.id !== id);
    saveClips(() => render());
    toast('Deleted', '#7f1d1d');
  }

  function doSave() {
    const ta = document.getElementById('addTextarea');
    const raw = ta.value.trim();
    if (!raw) { toast('Nothing to save!', '#7f1d1d'); return; }

    // Split by newline or comma to handle bulk paste
    const lines = raw.split(/[\n,]+/).map(l => l.trim()).filter(Boolean);
    const now = Date.now();

    lines.forEach((line, i) => {
      const type = detectType(line);
      const clip = {
        id: makeId() + i,
        value: line,
        type: type,
        createdAt: now + i,
        pinned: false,
      };
      if (type === 'email') {
        const name = guessName(line);
        if (name) clip.name = name;
      }
      clips.push(clip);
    });

    saveClips(() => {
      ta.value = '';
      render();
      toast('✓ Saved ' + lines.length + ' clip' + (lines.length > 1 ? 's' : '') + '!', '#14532d');
    });
  }

  async function doReadClipboard() {
    try {
      const text = await navigator.clipboard.readText();
      if (text && text.trim()) {
        document.getElementById('addTextarea').value = text.trim();
        toast('📋 Clipboard loaded!', '#1d4ed8');
      } else {
        toast('Clipboard is empty', '#7f1d1d');
      }
    } catch {
      toast('Allow clipboard permission and try again', '#7f1d1d');
    }
  }

  // ─── Event Listeners ──────────────────────────────────────────────────────
  // Tabs
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      activeTab = this.dataset.tab;
      render();
    });
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', function() {
    searchQuery = this.value;
    render();
  });

  // Save button
  document.getElementById('saveBtn').addEventListener('click', doSave);

  // Save on Ctrl+Enter in textarea
  document.getElementById('addTextarea').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      doSave();
    }
  });

  // Read clipboard button
  document.getElementById('readClipBtn').addEventListener('click', doReadClipboard);

  // Live updates when storage changes (e.g. from another tab)
  chrome.storage.onChanged.addListener(function(changes) {
    if (changes[STORAGE_KEY]) {
      clips = changes[STORAGE_KEY].newValue || [];
      render();
    }
  });

  // ─── Init ─────────────────────────────────────────────────────────────────
  loadClips();
</script>
</body>
</html>
