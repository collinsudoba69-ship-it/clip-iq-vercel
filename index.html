<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { background-color: #0f121d; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 16px; display: flex; flex-direction: column; height: 95vh; box-sizing: border-box; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .title-group { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; }
    .logo-box { width: 24px; height: 24px; background: #3b82f6; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    .open-site { color: #3b82f6; text-decoration: none; font-size: 13px; }
    .search-bar { background: #1e2230; border: 1px solid #2d3142; color: white; padding: 10px 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 16px; outline: none; font-size: 14px; }
    .tabs { display: flex; gap: 20px; border-bottom: 1px solid #2d3142; padding-bottom: 8px; margin-bottom: 16px; }
    .tab { cursor: pointer; color: #64748b; font-size: 14px; font-weight: 600; padding-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .tab.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
    .clips-container { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .clip-item { background: #1e2230; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d3142; }
    .clip-text { max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: #e2e8f0; }
    .copy-btn { background: #2d3142; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; }
    .copy-btn:hover { background: #3b82f6; }
    .input-area { background: #1e2230; padding: 12px; border-radius: 12px; border: 1px solid #2d3142; margin-top: auto; }
    .input-box { background: transparent; border: none; color: white; width: 100%; box-sizing: border-box; margin-bottom: 10px; resize: none; height: 40px; outline: none; font-size: 13px; font-family: inherit; }
    .btn-row { display: flex; gap: 8px; }
    .save-btn { background: #2563eb; color: white; border: none; padding: 10px; border-radius: 8px; flex-grow: 1; cursor: pointer; font-weight: bold; font-size: 13px; }
    .save-btn:hover { background: #3b82f6; }
    .clear-btn { background: #2d3142; border: none; padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 38px; }
    #toast { display: none; background: #10b981; color: white; padding: 8px; text-align: center; border-radius: 6px; margin-bottom: 12px; font-size: 12px; font-weight: 600; }
  </style>
</head>
<body>

  <div class="header-row">
    <div class="title-group">
      <div class="logo-box">❄</div>
      <span>ClipIQ</span>
    </div>
    <a href="#" class="open-site">Open site ↗</a>
  </div>
  
  <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search clips...">
  
  <div class="tabs">
    <div class="tab active" data-category="all">All</div>
    <div class="tab" data-category="emails">📧 Emails</div>
    <div class="tab" data-category="phones">📞 Phones</div>
    <div class="tab" data-category="text">📄 Text</div>
  </div>

  <div id="toast">Copied to clipboard!</div>

  <div class="clips-container" id="clipsContainer"></div>

  <div class="input-area">
    <textarea id="clipInput" class="input-box" placeholder="Type or paste here, then click Save..."></textarea>
    <div class="btn-row">
      <button id="saveBtn" class="save-btn">+ Save to ClipIQ</button>
      <button id="clearListBtn" class="clear-btn" title="Clear all saved clips">🗑️</button>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
